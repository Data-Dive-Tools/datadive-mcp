name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm provenance AND AWS OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: npm run build
      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      # Only runs when an actual publish happened (not when the action just
      # opened a "Version Packages" PR). If this step fails, the whole workflow
      # fails loudly so npm/SSM version drift can't pass silently.
      - name: Configure AWS credentials (OIDC)
        if: steps.changesets.outputs.published == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/gha-mcp-version-publisher
          aws-region: us-east-1
      - name: Publish latest version to SSM
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION="${{ fromJSON(steps.changesets.outputs.publishedPackages)[0].version }}"
          echo "Publishing version $VERSION to SSM"
          aws ssm put-parameter \
            --name /datadive/mcp/latest-version \
            --type String \
            --overwrite \
            --value "$VERSION"
