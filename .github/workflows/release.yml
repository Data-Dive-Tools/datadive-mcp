name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm provenance AND AWS OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: npm run build

      # Coverage runs before publish so a failing test gates the release and
      # coverage numbers are available for the Slack notification below.
      - name: Run tests with coverage
        run: npm run test:coverage
      - name: Extract coverage metrics
        id: coverage
        if: always() # surface coverage even when a later step fails
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              const fmt = (m) => (m && typeof m.pct === 'number') ? m.pct.toFixed(2) + '%' : '';
              const fs = require('fs');
              ['statements','branches','functions','lines'].forEach(k =>
                fs.appendFileSync(process.env.GITHUB_OUTPUT, k + '=' + fmt(c[k]) + '\n'));
            "
          else
            echo "No coverage summary found; emitting empty metrics"
            {
              echo "statements="
              echo "branches="
              echo "functions="
              echo "lines="
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      # Only runs when an actual publish happened (not when the action just
      # opened a "Version Packages" PR). If this step fails, the whole workflow
      # fails loudly so npm/SSM version drift can't pass silently.
      - name: Configure AWS credentials (OIDC)
        if: steps.changesets.outputs.published == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::237658314992:role/gha-mcp-version-publisher
          aws-region: us-east-1
      - name: Publish latest version to SSM
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION="${{ fromJSON(steps.changesets.outputs.publishedPackages)[0].version }}"
          echo "Publishing version $VERSION to SSM"
          aws ssm put-parameter \
            --name /datadive/mcp/latest-version \
            --type String \
            --overwrite \
            --value "$VERSION"

      # Slack stays silent when changesets only opens/updates the
      # "Version Packages" PR — only an actual npm publish notifies.
      - name: Notify Slack on publish
        if: steps.changesets.outputs.published == 'true'
        uses: ./.github/actions/slack-notify
        with:
          job-status: success
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          context-message: "Published @datadive-tools/mcp v${{ fromJSON(steps.changesets.outputs.publishedPackages)[0].version }} to npm"
          triggered-by: ${{ github.actor }}
          coverage-statements: ${{ steps.coverage.outputs.statements }}
          coverage-branches: ${{ steps.coverage.outputs.branches }}
          coverage-functions: ${{ steps.coverage.outputs.functions }}
          coverage-lines: ${{ steps.coverage.outputs.lines }}
      - name: Notify Slack on failure
        if: failure()
        uses: ./.github/actions/slack-notify
        with:
          job-status: failure
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          context-message: ${{ github.event.head_commit.message }}
          triggered-by: ${{ github.actor }}
          coverage-statements: ${{ steps.coverage.outputs.statements }}
          coverage-branches: ${{ steps.coverage.outputs.branches }}
          coverage-functions: ${{ steps.coverage.outputs.functions }}
          coverage-lines: ${{ steps.coverage.outputs.lines }}
